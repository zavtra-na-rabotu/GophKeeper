syntax = "proto3";

option go_package = "internal/pb";

message Credential {
  string login = 1;
  string password = 2;
}

message Text {
  string text = 1;
}

message Binary {
  bytes binary = 1;
}

message Card {
  string number = 1;
  string expiry_month = 2;
  string expiry_year = 3;
  string csc = 4;
  string name = 5;
}